<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - EduReserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        /* Gradiente moderno de fundo */
        background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .login-wrapper {
        width: 100%;
        max-width: 420px;
        padding: 20px;
      }
      .login-card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        padding: 40px 30px;
        border: 1px solid rgba(255,255,255,0.2);
      }
      .logo-icon {
        width: 64px;
        height: 64px;
        background: #eff6ff;
        color: #2563eb;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin: 0 auto 20px;
      }
      .form-control {
        border-radius: 10px;
        padding: 12px 16px;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        transition: all 0.2s;
      }
      .form-control:focus {
        background-color: #fff;
        border-color: #3b82f6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      }
      .btn-primary {
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        background: #2563eb;
        border: none;
        transition: all 0.2s;
      }
      .btn-primary:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
      }
      .alert { border-radius: 10px; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="logo-icon">
          <i class="bi bi-calendar-check-fill"></i>
        </div>
        <h3 class="text-center fw-bold mb-1" style="color: #0f172a;">EduReserva</h3>
        <p class="text-center text-muted small mb-4">Acesse sua conta para continuar</p>

        {% with messages = get_flashed_messages() %} 
          {% if messages %} 
            {% for message in messages %}
              <div class="alert alert-danger d-flex align-items-center py-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
              </div>
            {% endfor %} 
          {% endif %} 
        {% endwith %}

        <form action="{{ url_for('main.login') }}" method="POST">
          <div class="mb-3">
            <label for="nome" class="form-label small fw-semibold text-secondary mb-1">Nome do Professor</label>
            <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Joao Silva" required autofocus />
          </div>
          <div class="mb-4">
            <label for="senha" class="form-label small fw-semibold text-secondary mb-1">Senha</label>
            <input type="password" class="form-control" id="senha" name="senha" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary w-100 shadow-sm">Entrar no Sistema</button>
        </form>
      </div>
    </div>
  </body>
</html>
