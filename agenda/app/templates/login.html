<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Agendamentos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}"
    />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="logo-icon">
          <i class="bi bi-calendar-check-fill"></i>
        </div>
        <h3 class="text-center fw-bold mb-1" style="color: #0f172a">Agenda</h3>
        <p class="text-center text-muted small mb-4">
          Acesse sua conta para continuar
        </p>

        {% with messages = get_flashed_messages() %} {% if messages %} {% for
        message in messages %}
        <div
          class="alert alert-danger d-flex align-items-center py-2"
          role="alert"
        >
          <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <form action="{{ url_for('main.login') }}" method="POST">
          <div class="mb-3">
            <label
              for="nome"
              class="form-label small fw-semibold text-secondary mb-1"
              >Nome do Professor</label
            >
            <input
              type="text"
              class="form-control"
              id="nome"
              name="nome"
              placeholder="Ex: Joao Silva"
              required
              autofocus
            />
          </div>
          <div class="mb-4">
            <label
              for="senha"
              class="form-label small fw-semibold text-secondary mb-1"
              >Senha</label
            >
            <input
              type="password"
              class="form-control"
              id="senha"
              name="senha"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100 shadow-sm">
            Entrar no Sistema
          </button>
          <div class="text-center mt-4">
            <span class="text-secondary small">Ainda não tem conta?</span>
            <a
              href="https://eesjv.com.br/registrar"
              class="text-decoration-none fw-semibold small text-primary"
              >Criar conta</a
            >
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
